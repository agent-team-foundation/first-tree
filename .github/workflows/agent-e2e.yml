name: Agent E2E

# LLM-behavior evaluation jobs imported from first-tree (Phase 1B):
# first-tree-sync drift audit and onboarding smoke.
# Kept on cron + manual dispatch so they don't block PR merges; the
# primary `CI` workflow stays the gate for code merges.

on:
  schedule:
    # Daily 02:00 UTC (10:00 Asia/Shanghai)
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-validate:
    name: context tree e2e (legacy shell harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: bash e2e/github-validate-e2e.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  onboarding-smoke:
    name: onboarding smoke (legacy shell harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: bash e2e/onboarding-smoke.sh
