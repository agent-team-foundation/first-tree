name: Validate Members

on:
  pull_request:
    paths:
      - "members/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate member nodes
        run: python .scripts/validate_members.py
