name: npm Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-command:
    name: Publish Command
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve alpha version
        id: version
        working-directory: packages/command
        env:
          PACKAGE_NAME: "@agent-team-foundation/first-tree-hub"
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Base version must be a stable semver version, got $BASE_VERSION"
            exit 1
          fi

          ALPHA_VERSION="${BASE_VERSION}-alpha.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpha_version=$ALPHA_VERSION" >> "$GITHUB_OUTPUT"

          VIEW_ERROR=$(mktemp)
          if npm view "${PACKAGE_NAME}@${ALPHA_VERSION}" version > /dev/null 2> "$VIEW_ERROR"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Alpha version already exists: ${PACKAGE_NAME}@${ALPHA_VERSION}; skipping publish"
          elif grep -q "E404" "$VIEW_ERROR"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing alpha version: ${PACKAGE_NAME}@${ALPHA_VERSION}"
          else
            echo "::error::Failed to check npm registry for ${PACKAGE_NAME}@${ALPHA_VERSION}"
            cat "$VIEW_ERROR" >&2
            exit 1
          fi

      - if: steps.version.outputs.publish == 'true'
        uses: pnpm/action-setup@v4

      - name: Set alpha package version
        if: steps.version.outputs.publish == 'true'
        working-directory: packages/command
        env:
          ALPHA_VERSION: ${{ steps.version.outputs.alpha_version }}
          PACKAGE_NAME: "@agent-team-foundation/first-tree-hub"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const packagePath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          if (pkg.name !== process.env.PACKAGE_NAME) {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          pkg.version = process.env.ALPHA_VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          echo "Set ${PACKAGE_NAME} version to ${ALPHA_VERSION}"

      - if: steps.version.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.version.outputs.publish == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        working-directory: packages/command
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Send feishu message
        if: always()
        env:
          ACTIONS_FEISHU_TAG: "v1.3.1"
          INPUT_WEBHOOK: ${{ secrets.RELEASE_BOT_URL }}
          INPUT_MESSAGE_TYPE: "post"
          INPUT_TITLE: ${{ job.status == 'success' && 'npm alpha publish ✅ 成功' || 'npm alpha publish ❌ 失败' }}
          INPUT_CONTENT: |
            发布结果: ${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}
            Package: @agent-team-foundation/first-tree-hub
            Version: ${{ steps.version.outputs.alpha_version || 'unresolved' }}
            Publish: ${{ steps.version.outputs.publish || 'unknown' }}
            Install: npm install -g @agent-team-foundation/first-tree-hub@alpha
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "${INPUT_WEBHOOK:-}" ]]; then
            echo "::warning::RELEASE_BOT_URL is not configured; skipping Feishu notification."
            exit 0
          fi

          if ! wget -q "https://github.com/xiachufang/actions-feishu/releases/download/${ACTIONS_FEISHU_TAG}/linux-amd64-actions-feishu.tar.gz"; then
            echo "::warning::Failed to download actions-feishu."
            exit 0
          fi
          if ! tar zxf linux-amd64-actions-feishu.tar.gz feishu; then
            echo "::warning::Failed to extract actions-feishu."
            exit 0
          fi
          if ! ./feishu; then
            echo "::warning::Failed to send Feishu notification."
          fi

  publish-shared:
    name: Publish Shared
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve alpha version
        id: version
        working-directory: packages/shared
        env:
          PACKAGE_NAME: "@agent-team-foundation/first-tree-hub-shared"
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Base version must be a stable semver version, got $BASE_VERSION"
            exit 1
          fi

          ALPHA_VERSION="${BASE_VERSION}-alpha.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpha_version=$ALPHA_VERSION" >> "$GITHUB_OUTPUT"

          IS_PRIVATE=$(node -p "require('./package.json').private === true ? 'true' : 'false'")
          if [[ "$IS_PRIVATE" == "true" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "private=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME} is private; skipping npm publish"
            exit 0
          fi

          VIEW_ERROR=$(mktemp)
          if npm view "${PACKAGE_NAME}@${ALPHA_VERSION}" version > /dev/null 2> "$VIEW_ERROR"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Alpha version already exists: ${PACKAGE_NAME}@${ALPHA_VERSION}; skipping publish"
          elif grep -q "E404" "$VIEW_ERROR"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing alpha version: ${PACKAGE_NAME}@${ALPHA_VERSION}"
          else
            echo "::error::Failed to check npm registry for ${PACKAGE_NAME}@${ALPHA_VERSION}"
            cat "$VIEW_ERROR" >&2
            exit 1
          fi

      - if: steps.version.outputs.publish == 'true'
        uses: pnpm/action-setup@v4

      - name: Set alpha package version
        if: steps.version.outputs.publish == 'true'
        working-directory: packages/shared
        env:
          ALPHA_VERSION: ${{ steps.version.outputs.alpha_version }}
          PACKAGE_NAME: "@agent-team-foundation/first-tree-hub-shared"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const packagePath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          if (pkg.name !== process.env.PACKAGE_NAME) {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          pkg.version = process.env.ALPHA_VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          echo "Set ${PACKAGE_NAME} version to ${ALPHA_VERSION}"

      - if: steps.version.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.version.outputs.publish == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        working-directory: packages/shared
        run: npm publish --tag alpha --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Send feishu message
        if: always()
        env:
          ACTIONS_FEISHU_TAG: "v1.3.1"
          INPUT_WEBHOOK: ${{ secrets.RELEASE_BOT_URL }}
          INPUT_MESSAGE_TYPE: "post"
          INPUT_TITLE: ${{ job.status == 'success' && 'npm alpha publish ✅ 成功' || 'npm alpha publish ❌ 失败' }}
          INPUT_CONTENT: |
            发布结果: ${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}
            Package: @agent-team-foundation/first-tree-hub-shared
            Version: ${{ steps.version.outputs.alpha_version || 'unresolved' }}
            Publish: ${{ steps.version.outputs.publish || 'unknown' }}
            Install: npm install @agent-team-foundation/first-tree-hub-shared@alpha
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "${INPUT_WEBHOOK:-}" ]]; then
            echo "::warning::RELEASE_BOT_URL is not configured; skipping Feishu notification."
            exit 0
          fi

          if ! wget -q "https://github.com/xiachufang/actions-feishu/releases/download/${ACTIONS_FEISHU_TAG}/linux-amd64-actions-feishu.tar.gz"; then
            echo "::warning::Failed to download actions-feishu."
            exit 0
          fi
          if ! tar zxf linux-amd64-actions-feishu.tar.gz feishu; then
            echo "::warning::Failed to extract actions-feishu."
            exit 0
          fi
          if ! ./feishu; then
            echo "::warning::Failed to send Feishu notification."
          fi
