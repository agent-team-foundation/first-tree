name: npm Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-command:
    name: Publish Command Latest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_DATABASE_URL: postgres://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Validate stable release tag
        id: release
        working-directory: packages/command
        env:
          PACKAGE_NAME: "@agent-team-foundation/first-tree-hub"
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "::error::Stable npm releases must run from a git tag, got ref type '$GITHUB_REF_TYPE'."
            exit 1
          fi

          TAG_NAME="$GITHUB_REF_NAME"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Stable npm release tags must match vX.Y.Z, got '$TAG_NAME'."
            exit 1
          fi

          PACKAGE_JSON_NAME=$(node -p "require('./package.json').name")
          if [[ "$PACKAGE_JSON_NAME" != "$PACKAGE_NAME" ]]; then
            echo "::error::Unexpected package name: $PACKAGE_JSON_NAME"
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${TAG_NAME#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Tag $TAG_NAME does not match ${PACKAGE_NAME} version $PACKAGE_VERSION."
            exit 1
          fi

          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Package version must be a stable semver version, got '$PACKAGE_VERSION'."
            exit 1
          fi

          git fetch --no-tags origin +main:refs/remotes/origin/main
          TAG_COMMIT=$(git rev-parse "${TAG_NAME}^{commit}")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag $TAG_NAME points to commit $TAG_COMMIT, which is not on origin/main."
            exit 1
          fi

          VIEW_ERROR=$(mktemp)
          trap 'rm -f "$VIEW_ERROR"' EXIT
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2> "$VIEW_ERROR"; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published to npm; refusing to republish."
            exit 1
          elif grep -q "E404" "$VIEW_ERROR"; then
            echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
            echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with npm dist-tag 'latest'."
          else
            echo "::error::Failed to check npm registry for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            cat "$VIEW_ERROR" >&2
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Publish to npm
        working-directory: packages/command
        run: npm publish --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Send feishu message
        if: always()
        env:
          ACTIONS_FEISHU_TAG: "v1.3.1"
          INPUT_WEBHOOK: ${{ secrets.RELEASE_BOT_URL }}
          INPUT_MESSAGE_TYPE: "post"
          INPUT_TITLE: ${{ job.status == 'success' && 'npm latest publish ✅ 成功' || 'npm latest publish ❌ 失败' }}
          INPUT_CONTENT: |
            发布结果: ${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}
            Package: ${{ steps.release.outputs.package_name || '@agent-team-foundation/first-tree-hub' }}
            Version: ${{ steps.release.outputs.package_version || 'unresolved' }}
            Install: npm install -g @agent-team-foundation/first-tree-hub@latest
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "${INPUT_WEBHOOK:-}" ]]; then
            echo "::warning::RELEASE_BOT_URL is not configured; skipping Feishu notification."
            exit 0
          fi

          if ! wget -q "https://github.com/xiachufang/actions-feishu/releases/download/${ACTIONS_FEISHU_TAG}/linux-amd64-actions-feishu.tar.gz"; then
            echo "::warning::Failed to download actions-feishu."
            exit 0
          fi
          if ! tar zxf linux-amd64-actions-feishu.tar.gz feishu; then
            echo "::warning::Failed to extract actions-feishu."
            exit 0
          fi
          if ! ./feishu; then
            echo "::warning::Failed to send Feishu notification."
          fi
