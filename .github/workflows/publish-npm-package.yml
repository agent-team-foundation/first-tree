name: Publish NPM Package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # ── Setup ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── CI checks ──────────────────────────────────────
      - name: Run CI checks
        run: pnpm ci:check

      # ── Version & dist-tag extraction ───────────────────
      - name: Extract version and dist-tag
        id: version
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-([a-zA-Z]+) ]]; then
            DIST_TAG="${BASH_REMATCH[1]}"
            IS_PRERELEASE="true"
          else
            DIST_TAG="latest"
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Publishing version: $VERSION"
          echo "NPM dist-tag: $DIST_TAG"
          echo "Is pre-release: $IS_PRERELEASE"

      # ── Publish to NPM ─────────────────────────────────
      - name: Set package version
        working-directory: apps/cli
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$PKG_VERSION" --no-git-tag-version

      - name: Publish to NPM
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
        run: pnpm publish --tag "$DIST_TAG" --no-git-checks

      # ── GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG
