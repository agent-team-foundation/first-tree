name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check-branch-name:
    name: Check Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|refactor|test|docs|chore)/"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow convention: feat/, fix/, refactor/, test/, docs/, chore/"
            exit 1
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      skills: ${{ steps.filter.outputs.skills }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'biome.json'
              - 'turbo.json'
              - '.github/**'
            skills:
              - 'skills/**'

  validate-skill:
    name: Validate Skill
    needs: changes
    if: needs.changes.outputs.skills == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:skill

  lint:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      # Phase 1 invariant guard: `chat_participants` rows must be written
      # exclusively through `services/participant-mode.ts` so the
      # `(chats.type, agents.type) ⇒ mode` rule is enforced in one place.
      # Tests under `src/__tests__/` are allowed to seed pathological rows
      # for pollution-prevention tests; the production-code guard below
      # excludes them. See chat-participant-mode-fix-design.md §3.3.3.
      - name: Guard chat_participants writes
        run: |
          set -euo pipefail
          MATCHES=$(grep -rn 'insert(chatParticipants)' \
              packages/server/src \
            | grep -v '/services/participant-mode.ts:' \
            | grep -v '/__tests__/' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Disallowed chat_participants write outside services/participant-mode.ts:"
            echo "$MATCHES"
            exit 1
          fi
      - run: pnpm build
      - run: pnpm typecheck

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
