name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check-branch-name:
    name: Check Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          # hub-session-* branches are auto-created by the in-tree hub agent
          # runtime when a coder session opens a PR. The agent doesn't pick
          # the name, so the convention check skips them. Long-term fix is
          # to teach the hub session bootstrap to prefix with feat/ etc.
          if [[ "$BRANCH" =~ ^hub-session- ]]; then
            echo "Branch '$BRANCH' is auto-named by the hub agent runtime; skipping convention check."
            exit 0
          fi
          PATTERN="^(feat|fix|refactor|test|docs|chore)/"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow convention: feat/, fix/, refactor/, test/, docs/, chore/"
            exit 1
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      skills: ${{ steps.filter.outputs.skills }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'apps/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'biome.json'
              - 'turbo.json'
              - '.github/**'
            skills:
              - 'skills/**'

  validate-skill:
    name: Validate Skill
    needs: changes
    if: needs.changes.outputs.skills == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:skill

  lint:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # Persist Turborepo's task cache between runs. With this, an unchanged
      # `build` / `typecheck` task hashes the same and turbo replays the
      # cached result instead of re-running. Key is job-scoped so the lint
      # and test jobs don't race on the same save slot (actions/cache drops
      # the second writer with a warning, which would silently lose half
      # the cache); `restore-keys` falls back to the most recent prefix
      # match (any prior lint run on this OS).
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm typecheck

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    # Sidecar Postgres started by the runner in parallel with checkout / install,
    # so the test process never pays a `docker pull postgres:17` cost on its
    # critical path. `global-setup.ts` reads `CI_DATABASE_URL` and skips the
    # testcontainers spin-up; locally that env is unset and the original
    # testcontainers path stays intact.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_DATABASE_URL: postgres://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  grep-legacy-names:
    name: Forbid legacy CLI / env names
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    # NOTE: This job will fail until T3.2 (apps/cli/package.json bin rename to
    # first-tree). Once T3.2 lands the bin/env renames repo-wide, remove the
    # continue-on-error line below so the job becomes blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: grep — forbid old hub-client subcommand syntax
        run: |
          # The `[f]` char-class is a self-immunity trick: the regex still
          # matches the literal `first-tree-hub`, but `grep -r first-tree-hub`
          # over this file does NOT self-match the regex itself.
          # `--exclude-dir=migration` keeps the docs/migration/ guides — which
          # legitimately show the old names side-by-side with the new — from
          # tripping the check.
          if grep -rEn --exclude-dir=migration "[f]irst-tree-hub (onboard|connect|disconnect|update|claim|client (start|stop|restart|status|doctor|claim|list|disconnect|config))" packages apps scripts docs skills .github; then
            echo "::error::found legacy first-tree-hub subcommand syntax; should now be 'first-tree ...'"
            exit 1
          fi
      - name: grep — forbid FIRST_TREE_HUB_ env vars
        run: |
          if grep -rEn "FIRST_TREE_HUB_(AGENT_ID|LOG_LEVEL|JSON)" packages apps scripts docs skills .github; then
            echo "::error::found legacy FIRST_TREE_HUB_* env var references; should use FIRST_TREE_* (Phase 1A T1A.5)"
            exit 1
          fi
