name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-branch-name:
    name: Check Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|refactor|test|doc|chore)/"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow convention: feat/, fix/, refactor/, test/, doc/, chore/"
            exit 1
          fi

  lint:
    name: Lint & Type Check
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'doc/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright

  test:
    name: Test
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'doc/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - name: Run tests
        run: |
          rc=0; uv run pytest -v || rc=$?
          if [ $rc -eq 5 ]; then echo "No tests collected, skipping"; exit 0; fi
          exit $rc
