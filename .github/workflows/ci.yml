name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check-branch-name:
    name: Check Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          # hub-session-* branches are auto-created by the in-tree hub agent
          # runtime when a coder session opens a PR. The agent doesn't pick
          # the name, so the convention check skips them. Long-term fix is
          # to teach the hub session bootstrap to prefix with feat/ etc.
          if [[ "$BRANCH" =~ ^hub-session- ]]; then
            echo "Branch '$BRANCH' is auto-named by the hub agent runtime; skipping convention check."
            exit 0
          fi
          PATTERN="^(feat|fix|refactor|test|docs|chore|merge)/"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow convention: feat/, fix/, refactor/, test/, docs/, chore/, merge/"
            exit 1
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      skills: ${{ steps.filter.outputs.skills }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'apps/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'biome.json'
              - 'turbo.json'
              - '.github/**'
            skills:
              - 'skills/**'

  validate-skill:
    name: Validate Skill
    needs: changes
    if: needs.changes.outputs.skills == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:skill

  lint:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      # Persist Turborepo's task cache between runs. With this, an unchanged
      # `build` / `typecheck` task hashes the same and turbo replays the
      # cached result instead of re-running. Key is job-scoped so the lint
      # and test jobs don't race on the same save slot (actions/cache drops
      # the second writer with a warning, which would silently lose half
      # the cache); `restore-keys` falls back to the most recent prefix
      # match (any prior lint run on this OS).
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm typecheck

  test_server:
    name: Test Server
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    # Server tests own the only PostgreSQL sidecar. Keeping them on a dedicated
    # runner restores the proven two-fork layout without stacking Fastify's
    # module graph next to the CLI, Client, or Web suites.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_DATABASE_URL: postgres://test:test@localhost:5432/test
      VITEST_MAX_FORKS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          # Each parallel test job owns its cache namespace. That preserves
          # incremental Turbo hits without making every runner upload the
          # previous combined test/build archive.
          key: ${{ runner.os }}-turbo-test-server-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-server-
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter=@first-tree/server --concurrency=1

  test_client_web:
    name: Test Client & Web
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # One fork per package keeps the two-package Turbo fan-out inside the
      # GitHub-hosted runner's memory budget.
      VITEST_MAX_FORKS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-client-web-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-client-web-
      - run: pnpm install --frozen-lockfile
      # Skill-eval fixtures invoke the built CLI while validating real tree
      # workflows, so this group needs the same workspace dist artifacts as
      # the CLI suite even though first-tree-dev#test itself is excluded.
      - run: pnpm build
      - name: Test packages except Server and CLI
        run: pnpm exec turbo run test --filter='!@first-tree/server' --filter='!first-tree-dev' --concurrency=2

  test_cli:
    name: Test CLI
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # The CLI suite previously exhausted a single worker's ~4GB V8 heap.
      # Keep its bounded batches serial and isolate them from every other
      # package on a dedicated runner.
      VITEST_MAX_FORKS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-cli-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-cli-
      - run: pnpm install --frozen-lockfile
      # `post-bundle-channel-home.test.ts` spawns the built CLI dist
      # binary to verify channel-home resolution. Without an explicit
      # build step ahead of `pnpm test`, the test's `ensureDistBuilt`
      # fallback runs `pnpm build` inside vitest's `beforeAll` — that
      # took ~125s on a cold CI runner and tripped vitest's
      # worker→controller RPC heartbeat timeout (`Unhandled Error:
      # Timeout calling "onTaskUpdate"`), failing the job even though
      # all 233 tests passed. Building before vitest starts keeps the
      # heavy work outside the worker IPC window.
      - run: pnpm build
      # Keep the CLI behind Turbo so an unchanged first-tree-dev#test task can
      # use cache while its package script releases heap between batches.
      - run: pnpm exec turbo run test --filter=first-tree-dev --concurrency=1

  test:
    name: Test
    needs: [changes, test_server, test_client_web, test_cli]
    if: >-
      always() &&
      (needs.changes.result != 'success' ||
       needs.changes.outputs.code == 'true' ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      # Preserve one stable branch-protection check while the resource-specific
      # suites run in parallel. A failed, cancelled, or unexpectedly skipped
      # child suite fails closed here.
      - name: Verify parallel test jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          SERVER_RESULT: ${{ needs.test_server.result }}
          CLIENT_WEB_RESULT: ${{ needs.test_client_web.result }}
          CLI_RESULT: ${{ needs.test_cli.result }}
        run: |
          for result in "$CHANGES_RESULT" "$SERVER_RESULT" "$CLIENT_WEB_RESULT" "$CLI_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "::error::A required test job finished with result: $result"
              exit 1
            fi
          done

  portable-smoke:
    name: Portable CLI Smoke
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: "scripts/portable/node-version.txt"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build linux-x64 portable artifact
        run: |
          ./scripts/portable/build-release.sh \
            --channel prod \
            --version 0.0.0 \
            --download-base-url "https://download.first-tree.ai/releases" \
            --out-dir .portable-smoke \
            --platform linux-x64
      # A release-resume rerun must reproduce the exact bytes already uploaded,
      # or upload-s3.sh fails closed on its immutable-object check. Run the
      # whole pipeline again — including the workspace build, which a real
      # publish rerun re-executes — and require identical artifacts.
      - name: Rebuild and verify byte-identical artifacts
        run: |
          FIRST_TREE_PORTABLE_NODE_TARBALL_DIR="$PWD/.portable-smoke/.cache/node" \
          ./scripts/portable/build-release.sh \
            --channel prod \
            --version 0.0.0 \
            --download-base-url "https://download.first-tree.ai/releases" \
            --out-dir .portable-smoke-rebuild \
            --platform linux-x64
          cmp .portable-smoke/prod/0.0.0/SHA256SUMS .portable-smoke-rebuild/prod/0.0.0/SHA256SUMS
          diff .portable-smoke/prod/0.0.0/manifest.json .portable-smoke-rebuild/prod/0.0.0/manifest.json
      - name: Dry-run portable S3 upload
        run: |
          mkdir -p .portable-smoke-bin
          printf '%s\n' '#!/usr/bin/env bash' 'exit 0' > .portable-smoke-bin/aws
          chmod +x .portable-smoke-bin/aws
          PATH="$PWD/.portable-smoke-bin:$PATH" ./scripts/portable/upload-s3.sh \
            --channel prod \
            --out-dir .portable-smoke \
            --bucket first-tree-portable-smoke \
            --prefix releases \
            --endpoint-url https://s3.example.test \
            --region us-east-1 \
            --download-base-url "https://download.first-tree.ai/releases" \
            --dry-run
      - name: Verify linux-x64 portable artifact
        run: |
          node scripts/portable/verify-portable-artifact.mjs \
            --manifest .portable-smoke/prod/0.0.0/manifest.json \
            --platform linux-x64 \
            --tarball .portable-smoke/prod/0.0.0/first-tree-0.0.0-linux-x64.tar.gz

  check-migrations:
    name: Migrations
    runs-on: ubuntu-latest
    # Always runs — even on PRs that touch no server code. Branch protection
    # no longer requires PRs to be up to date with main, so this job is the
    # single guard against two PRs landing colliding migration idxs.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Fetch main for cross-branch comparison
        # Only PR runs need to compare HEAD against main. On push-to-main
        # the local contiguity check is sufficient (a duplicate idx that
        # snuck through two racing PRs surfaces as a broken sequence in
        # _journal.json) and fetching main risks a TOCTOU "missing from
        # HEAD" false positive if another push lands between this push
        # and the fetch.
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin main:refs/remotes/origin/main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/check-migrations.mjs

  grep-legacy-names:
    name: Forbid legacy CLI / env names
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep — forbid old hub-client subcommand syntax
        run: |
          # The `[f]` char-class is a self-immunity trick: the regex still
          # matches the literal `first-tree-hub`, but `grep -r first-tree-hub`
          # over this file does NOT self-match the regex itself.
          # `--exclude-dir=migration` keeps the docs/migration/ guides — which
          # legitimately show the old names side-by-side with the new — from
          # tripping the check.
          if grep -rEn --exclude-dir=migration "[f]irst-tree-hub (onboard|connect|disconnect|update|claim|client (start|stop|restart|status|doctor|claim|list|disconnect|config))" packages apps scripts docs skills .github; then
            echo "::error::found legacy first-tree-hub subcommand syntax; should now be 'first-tree ...'"
            exit 1
          fi
      - name: grep — forbid FIRST_TREE_HUB_ env vars
        run: |
          # `--exclude-dir=migration` keeps the docs/migration/ env-var rename
          # tables (which legitimately list the old FIRST_TREE_HUB_* names
          # alongside the new FIRST_TREE_* ones) from tripping the check.
          if grep -rEn --exclude-dir=migration "FIRST_TREE_HUB_(AGENT_ID|LOG_LEVEL|JSON)" packages apps scripts docs skills .github; then
            echo "::error::found legacy FIRST_TREE_HUB_* env var references; should use FIRST_TREE_* (Phase 1A T1A.5)"
            exit 1
          fi
      - name: grep — forbid any literal first-tree-hub (broad sweep)
        run: |
          # N-1 broad sweep: forbid any first-tree-hub literal anywhere except
          # the documented legitimate residues. The narrow subcommand regex above
          # only catches Phase 1A's hub-client verbs; this catches future
          # regressions where someone re-introduces `first-tree-hub <new-cmd>`,
          # `@agent-team-foundation/first-tree-hub`, or naked `first-tree-hub`
          # mentions in any code/config/docs.
          #
          # Legitimate residues (allow-listed and filtered out via the trailing
          # `grep -v` pipeline):
          # - docs/migration/**                          : migration tables show old↔new
          # - .github/workflows/ci.yml                   : this file's own regex literals (self-immunity via [f])
          # - packages/server/drizzle/*.sql              : SQL migrations are immutable historical artifacts
          # - packages/client/src/runtime/workspace-migrations.ts        : PR #869 hardcoded `v1-retired-source-repo-first-tree-hub`
          #     migration whose only job is to clean up the retired clone — the
          #     dirname is the matching key, so the literal cannot be avoided.
          # - packages/client/src/__tests__/workspace-migrations.test.ts : fixtures for the above migration.
          # - packages/client/src/runtime/agent-bootstrap.ts             : header comment naming the migration target.
          # - docs/development/agent-workspace-state.md                  : durable contract doc names the retired repo.
          hits=$(grep -rEn \
            --exclude-dir=migration \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' --include='*.cjs' \
            --include='*.json' --include='*.yaml' --include='*.yml' --include='*.md' --include='*.sh' \
            "[f]irst-tree-hub" packages apps scripts docs skills .github \
            | grep -v -E '^\.github/workflows/ci\.yml:|^packages/client/src/runtime/workspace-migrations\.ts:|^packages/client/src/__tests__/workspace-migrations\.test\.ts:|^packages/client/src/runtime/agent-bootstrap\.ts:|^docs/development/agent-workspace-state\.md:' \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::found a 'first-tree-hub' literal outside the documented allow-list — see N-1 in PR-1 description"
            echo "$hits"
            exit 1
          fi
      - name: grep — forbid the literal three-word product name "First Tree Hub"
        run: |
          # Second-pass sweep added after PR-1 review-round-2 found that the
          # hyphenated `first-tree-hub` check above misses the three-word
          # form "First Tree Hub" (prose / titles / UI strings). N-3=a
          # ("Hub brand fully retired") covers both forms.
          #
          # The `[F]` self-immunity trick keeps this file's own comments
          # (which must spell out the forbidden literal) from tripping the
          # check. Same allow-list as the broad sweep above; docs/ stays
          # excluded because the migration tables and cli-reference may
          # still mention the three-word form historically.
          hits=$(grep -rEn \
            --exclude-dir=migration \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=docs \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' --include='*.cjs' \
            --include='*.json' --include='*.yaml' --include='*.yml' --include='*.md' --include='*.sh' \
            "[F]irst Tree Hub" packages apps scripts docs skills .github \
            | grep -v -E '^\.github/workflows/ci\.yml:' \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::found a 'First Tree Hub' three-word product-name literal outside the allow-list — N-3 brand retirement"
            echo "$hits"
            exit 1
          fi
