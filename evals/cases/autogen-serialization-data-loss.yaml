# Eval case: Structured logging serialization drops subclass fields
# Based on: https://github.com/microsoft/autogen/pull/6889
# Issue: https://github.com/microsoft/autogen/issues/6855
# Bug: model_dump_json() on BaseModel fields typed as base classes
#      silently drops subclass-specific fields (e.g. content, type).

id: autogen-serialization-data-loss
source: custom
repo: microsoft/autogen
commit_sha: "9cb067e6ab48b4cb29e6384cd229b9aa78b57b7b"
fix_commit_sha: "ec5da1ef7bbef2117d8f38f6caa2fc17145b7368"
task: |
  Fix a bug where structured logging loses message data during JSON
  serialization.

  When agents produce messages (e.g. TextMessage with content="Hello"),
  and those messages are serialized for logging via `model_dump_json()`,
  subclass-specific fields like `content` and `type` are silently
  dropped. Only base class fields (like `id`, `source`, `created_at`)
  survive serialization.

  For example:
    - A TextMessage with content="Hello, world!" and source="Agent"
    - Gets wrapped in a GroupChatMessage and serialized
    - The JSON output is missing `content` and `type` entirely
    - This makes structured logs useless for debugging

  The problem affects multiple model classes that hold message fields
  typed as base classes but containing subclass instances. All of them
  lose subclass data during serialization.

  Find and fix the root cause across all affected model classes. Add tests that verify subclass fields (e.g. content, type) survive serialization in GroupChatMessage and GroupChatStart.
