name: Validate Tree

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate nodes
        run: python .context-tree/validate_nodes.py

      - name: Validate members
        run: python .context-tree/validate_members.py
