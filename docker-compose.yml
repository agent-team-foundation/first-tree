services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firsttree}
      POSTGRES_USER: ${POSTGRES_USER:-firsttree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firsttree}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firsttree}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # S3-compatible object storage for attachment/avatar payloads. The server
  # auto-creates the bucket on boot; console at http://localhost:9001.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-firsttree}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-firsttree-minio}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  miniodata:
