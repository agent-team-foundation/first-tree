# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Deploy: connect this repo in Render Dashboard → auto-detects render.yaml

databases:
  - name: first-tree-core-db
    plan: starter
    databaseName: firsttreecore
    user: firsttreecore
    ipAllowList: []

services:
  - type: web
    name: first-tree-core
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: FIRST_TREE_DATABASE_URL
        fromDatabase:
          name: first-tree-core-db
          property: connectionString
      - key: FIRST_TREE_HOST
        value: "0.0.0.0"
      - key: FIRST_TREE_PORT
        value: "8000"
      - key: FIRST_TREE_CONTEXT_TREE_REPO
        sync: false
      - key: FIRST_TREE_GITHUB_TOKEN
        sync: false
      - key: FIRST_TREE_GITHUB_WEBHOOK_SECRET
        sync: false
      - key: FIRST_TREE_ADMIN_PASSWORD
        generateValue: true
      - key: FIRST_TREE_JWT_SECRET
        generateValue: true
      - key: FIRST_TREE_ENCRYPTION_KEY
        generateValue: true
