# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Deploy: connect this repo in Render Dashboard → auto-detects render.yaml

databases:
  - name: agent-hub-db
    plan: starter
    databaseName: agenthub
    user: agenthub
    ipAllowList: []

services:
  - type: web
    name: agent-hub
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: AGENT_HUB_DATABASE_URL
        fromDatabase:
          name: agent-hub-db
          property: connectionString
      - key: AGENT_HUB_HOST
        value: "0.0.0.0"
      - key: AGENT_HUB_PORT
        value: "8000"
      - key: AGENT_HUB_CONTEXT_TREE_REPO
        sync: false
      - key: AGENT_HUB_GITHUB_TOKEN
        sync: false
      - key: AGENT_HUB_GITHUB_WEBHOOK_SECRET
        sync: false
      - key: AGENT_HUB_ADMIN_PASSWORD
        generateValue: true
      - key: AGENT_HUB_JWT_SECRET
        generateValue: true
      - key: AGENT_HUB_ENCRYPTION_KEY
        generateValue: true
