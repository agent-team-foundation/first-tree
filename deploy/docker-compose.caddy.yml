# Production deployment with automatic HTTPS via Caddy
#
# Prerequisites:
#   1. Domain DNS A record pointing to this server's public IP
#   2. Ports 80 and 443 open
#
# Usage:
#   cp .env.example .env   # edit required values
#   DOMAIN=hub.example.com docker compose -f deploy/docker-compose.caddy.yml up -d
#
# Caddy automatically obtains and renews Let's Encrypt SSL certificates.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env or environment}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      FIRST_TREE_DATABASE_URL: postgresql://${POSTGRES_USER:-firsttreecore}:${POSTGRES_PASSWORD:-firsttreecore}@postgres:5432/${POSTGRES_DB:-firsttreecore}
      FIRST_TREE_HOST: "0.0.0.0"
      FIRST_TREE_PORT: "8000"
      FIRST_TREE_JWT_SECRET: ${FIRST_TREE_JWT_SECRET}
      FIRST_TREE_ENCRYPTION_KEY: ${FIRST_TREE_ENCRYPTION_KEY}
      FIRST_TREE_CONTEXT_TREE_REPO: ${FIRST_TREE_CONTEXT_TREE_REPO}
      FIRST_TREE_GITHUB_TOKEN: ${FIRST_TREE_GITHUB_TOKEN}
      FIRST_TREE_GITHUB_WEBHOOK_SECRET: ${FIRST_TREE_GITHUB_WEBHOOK_SECRET:-}
      FIRST_TREE_ADMIN_PASSWORD: ${FIRST_TREE_ADMIN_PASSWORD:-}
      FIRST_TREE_CORS_ORIGIN: https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firsttreecore}
      POSTGRES_USER: ${POSTGRES_USER:-firsttreecore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firsttreecore}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firsttreecore}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
