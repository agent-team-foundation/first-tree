<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="First Tree — infrastructure for agent teams: registration, authentication, messaging, and admin dashboard." />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>First Tree</title>
    <!--
      NO INLINE SCRIPTS in this file: the app-wide Content-Security-Policy
      (packages/server/src/security-headers.ts) enforces `script-src 'self'`
      plus enumerated analytics origins — no `unsafe-inline`, no nonces. All
      bootstrap logic lives in external same-origin files under public/:

      - /theme-init.js      synchronous (blocking) on purpose — applies the
                            dark class before first paint to avoid a
                            light-mode flash.
      - /analytics-init.js  deferred — GA4 + Microsoft Clarity loaders,
                            hostname-gated to production. Rationale and
                            property/project details live in that file. The
                            React app root is masked below (data-clarity-mask)
                            so customer/workspace text is not uploaded in
                            Clarity recordings by default.
    -->
    <script src="/theme-init.js"></script>
    <script defer src="/analytics-init.js"></script>
  </head>
  <body>
    <div id="root" data-clarity-mask="true"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
